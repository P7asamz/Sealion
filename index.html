<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCORD : IMSEALIONNN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ec4899;
            --neon-purple: #a855f7;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #0d0d0f;
            background-image: 
                radial-gradient(at 10% 10%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(168, 85, 247, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .font-neon {
            font-family: 'Orbitron', sans-serif;
        }
        
        /* เอฟเฟกต์เรืองแสงหัวข้อ */
        .neon-glow {
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.7), 0 0 20px rgba(236, 72, 153, 0.4);
        }

        /* รูปโปรไฟล์เรืองแสงแบบ Gradient */
        .profile-glow {
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.3), 0 0 40px rgba(168, 85, 247, 0.15);
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
        }

        /* --- สไตล์การ์ดแนวตั้ง --- */
        .credit-card {
            position: relative;
            background: rgba(24, 24, 27, 0.4);
            border: 1px solid rgba(39, 39, 42, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* แสงวิ่งผ่านการ์ดเมื่อ Hover */
        .credit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.06),
                transparent
            );
            transition: 0.6s;
            z-index: 2;
        }

        .credit-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(236, 72, 153, 0.6);
            box-shadow: 
                0 20px 40px -15px rgba(0, 0, 0, 0.8),
                0 0 25px -5px rgba(236, 72, 153, 0.35);
        }

        .credit-card:hover::before {
            left: 100%;
        }

        .credit-image {
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .credit-card:hover .credit-image {
            transform: scale(1.06);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen selection:bg-pink-500 selection:text-black">

    <header class="py-10 border-b border-zinc-800/50 bg-zinc-950/60 backdrop-blur-lg sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-center gap-5 md:gap-8">
            <div class="relative w-20 h-20 md:w-24 md:h-24 rounded-full p-[3px] profile-glow overflow-hidden shrink-0">
                <img src="https://img2.pic.in.th/1eb70379-638a-4694-90eb-693ed5f2892f0887f90e415c8ae2.png" 
                     alt="SEALION Profile" 
                     class="w-full h-full object-cover rounded-full bg-zinc-900">
            </div>
            <div class="text-center sm:text-left">
                <h1 class="text-3xl md:text-5xl lg:text-6xl font-neon font-black tracking-wider text-pink-500 neon-glow uppercase break-all">
                    imsealionnn
                </h1>
                <div class="flex items-center justify-center sm:justify-start gap-2 mt-2">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <p class="text-zinc-300 text-sm md:text-base font-light tracking-wide">
                        ประวัติการซื้อ-ขาย FiveM • <span class="font-semibold text-white">ปลอดภัย 100%</span>
                    </p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        
        <div class="max-w-md mx-auto mb-10 bg-zinc-950/40 border border-zinc-800/80 rounded-2xl p-6 text-center shadow-xl backdrop-blur-md">
            <p class="text-zinc-400 text-xs uppercase tracking-widest font-neon">ยอดขายรวมทั้งหมด</p>
            <h2 id="total-m-display" class="text-4xl md:text-5xl font-neon font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-400 mt-1">
                0M
            </h2>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mb-12" id="filter-container">
            <button onclick="filterCountry('all')" id="btn-all" class="px-5 py-2 rounded-xl text-sm font-medium transition-all duration-300 bg-pink-550 border border-pink-500 bg-pink-500 text-black shadow-lg shadow-pink-500/20">
                🌐 ทั้งหมด
            </button>
        </div>

        <div id="dynamic-content" class="space-y-16">
            </div>

    </main>

    <footer class="border-t border-zinc-900/50 bg-zinc-950 py-10 mt-24">
        <div class="max-w-5xl mx-auto px-4 text-center">
            <p class="font-neon text-sm text-zinc-500 tracking-widest">IMSEALIONNN</p>
            <p class="text-xs text-zinc-700 tracking-wider mt-2">&copy; 2026 SEALION. Official Vouch Gallery.</p>
        </div>
    </footer>

    <div id="imageModal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300" onclick="closeModal()">
        <button class="absolute top-6 right-6 text-zinc-500 hover:text-white text-4xl font-light transition-colors" onclick="closeModal()">&times;</button>
        <div class="max-w-4xl max-h-[90vh] overflow-hidden rounded-2xl border border-zinc-800 bg-zinc-950 shadow-2xl shadow-black p-1.5" onclick="event.stopPropagation()">
            <img id="modalImage" src="" alt="Enlarged Credit" class="max-w-full max-h-[85vh] object-contain rounded-xl">
        </div>
    </div>

    <script>
        let allData = []; // เก็บข้อมูลทั้งหมดไว้ใช้ทำระบบตัวกรองข้อมูล

        async function loadCredits() {
            const dynamicContent = document.getElementById('dynamic-content');
            const totalDisplay = document.getElementById('total-m-display');
            const filterContainer = document.getElementById('filter-container');
            let totalM = 0;

            try {
                const response = await fetch('credits.txt');
                if (!response.ok) throw new Error('Load failed');
                
                const text = await response.text();
                const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
                
                // โครงสร้างสำหรับจัดกลุ่มประเทศ { "ประเทศไทย": [...], "ประเทศ X": [...] }
                const groupedCountries = {};

                lines.forEach(line => {
                    const parts = line.split(',');
                    const url = parts[0] ? parts[0].trim() : '';
                    const country = parts[1] ? parts[1].trim() : 'ทั่วไป';
                    const mAmount = parts[2] ? parts[2].trim() : '0';

                    const mValue = parseFloat(mAmount);
                    if (!isNaN(mValue)) { totalM += mValue; }

                    const creditItem = { url, country, mAmount };
                    allData.push(creditItem);

                    // ถ้ายังไม่มีกลุ่มประเทศนี้ ให้สร้าง Array มารองรับ
                    if (!groupedCountries[country]) {
                        groupedCountries[country] = [];
                    }
                    groupedCountries[country].push(creditItem);
                });

                // แสดงยอดรวมสุทธิทั้งหมดด้านบน
                totalDisplay.innerText = totalM.toLocaleString() + 'M';

                // วนลูปสร้างปุ่มเมนูด้านบนตามชื่อประเทศที่มีจริงในไฟล์
                Object.keys(groupedCountries).forEach(countryName => {
                    const btn = document.createElement('button');
                    btn.id = `btn-${countryName}`;
                    btn.className = "px-5 py-2 rounded-xl text-sm font-medium transition-all duration-300 bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white hover:border-zinc-700";
                    btn.innerText = `📍 ${countryName}`;
                    btn.onclick = () => filterCountry(countryName);
                    filterContainer.appendChild(btn);
                });

                // แสดงผลแยกกลุ่มประเทศลงบนหน้าเว็บ
                renderGroups(groupedCountries);

            } catch (error) {
                console.error(error);
                dynamicContent.innerHTML = `<p class="text-pink-500 text-center py-10 bg-zinc-950 rounded-2xl border border-dashed border-zinc-800">ไม่สามารถโหลดไฟล์ credits.txt ได้ หรือรูปแบบไฟล์ไม่ถูกต้อง</p>`;
            }
        }

        // ฟังก์ชันสำหรับวาดกลุ่มประเทศและรายการการ์ด
        function renderGroups(groups) {
            const dynamicContent = document.getElementById('dynamic-content');
            dynamicContent.innerHTML = ''; // ล้างค่าเก่าก่อนวาดใหม่

            Object.keys(groups).forEach(countryName => {
                const items = groups[countryName];

                // สร้าง Section ของแต่ละประเทศ
                const section = document.createElement('section');
                section.className = "country-section animate-fade-in";
                section.setAttribute('data-country', countryName);

                // สร้างหัวข้อชื่อประเทศระบุความล้ำ
                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-6 border-b border-zinc-800 pb-3">
                        <h3 class="text-xl md:text-2xl font-semibold text-white tracking-wide">📍 ${countryName}</h3>
                        <span class="bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs px-2.5 py-1 rounded-full font-neon">
                            ${items.length} รายการ
                        </span>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8">
                        ${items.map(item => `
                            <div class="credit-card group cursor-pointer aspect-[3/4] flex flex-col justify-between p-2 shadow-2xl" onclick="openModal(this)">
                                <div class="w-full h-[78%] rounded-xl overflow-hidden bg-zinc-900/50 flex items-center justify-center relative">
                                    <img src="${item.url}" 
                                         alt="Credit Image" 
                                         class="credit-image w-full h-full object-cover"
                                         onerror="this.src='https://placehold.co/400x533/18181b/ec4899?text=Image+Not+Found'">
                                </div>
                                <div class="h-[20%] w-full px-2 flex flex-col justify-center">
                                    <div class="flex justify-between items-center">
                                        <span class="text-zinc-500 text-xs truncate max-w-[60%]"> </span>
                                        <span class="text-pink-500 font-neon font-bold text-sm bg-pink-500/10 border border-pink-500/20 px-2 py-0.5 rounded-md">
                                            ${item.mAmount}M
                                        </span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                dynamicContent.appendChild(section);
            });
        }

        // ระบบเลือกกรองดูเฉพาะประเทศเมื่อคลิกปุ่มด้านบน
        function filterCountry(targetCountry) {
            // ปรับสีไฮไลท์ปุ่มที่ถูกเลือกให้เป็นสีชมพูเรืองแสง
            const buttons = document.querySelectorAll('#filter-container button');
            buttons.forEach(btn => {
                btn.className = "px-5 py-2 rounded-xl text-sm font-medium transition-all duration-300 bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white hover:border-zinc-700";
            });
            
            const activeBtn = document.getElementById(targetCountry === 'all' ? 'btn-all' : `btn-${targetCountry}`);
            if(activeBtn) {
                activeBtn.className = "px-5 py-2 rounded-xl text-sm font-medium transition-all duration-300 bg-pink-500 border border-pink-500 text-black shadow-lg shadow-pink-500/20";
            }

            // จัดกลุ่มและแสดงข้อมูลใหม่ตามเงื่อนไข
            if (targetCountry === 'all') {
                const reGrouped = {};
                allData.forEach(item => {
                    if (!reGrouped[item.country]) reGrouped[item.country] = [];
                    reGrouped[item.country].push(item);
                });
                renderGroups(reGrouped);
            } else {
                const filteredGroup = {};
                filteredGroup[targetCountry] = allData.filter(item => item.country === targetCountry);
                renderGroups(filteredGroup);
            }
        }

        function openModal(element) {
            const imgSrc = element.querySelector('.credit-image').src;
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = imgSrc;
            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => { modalImg.src = ''; }, 300);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        window.onload = loadCredits;
    </script>

</body>
</html>
