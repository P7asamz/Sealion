<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMSEALIONNN STORE - CREDIT & VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ec4899;
            --neon-purple: #a855f7;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #060608;
            background-image: 
                radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .font-neon {
            font-family: 'Orbitron', sans-serif;
        }
        
        .neon-glow {
            text-shadow: 0 0 10px rgba(236, 72, 153, 0.5), 0 0 20px rgba(236, 72, 153, 0.2);
        }

        .profile-glow {
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.2), 0 0 40px rgba(168, 85, 247, 0.1);
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
        }

        /* --- การ์ดเครดิตดีไซน์แนว Inventory Item --- */
        .credit-card {
            position: relative;
            background: rgba(13, 13, 16, 0.7);
            border: 1px solid rgba(39, 39, 42, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* เอฟเฟกต์แสงวิบวับพาดผ่านตอน Hover */
        .credit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(236, 72, 153, 0.2),
                transparent
            );
            transform: skewX(-20deg);
            transition: 0.6s;
            z-index: 5;
        }

        .credit-card:hover {
            transform: scale(1.03);
            border-color: #ec4899;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.3);
        }

        .credit-card:hover::before {
            left: 150%;
        }

        .credit-image {
            transition: transform 0.5s ease, filter 0.3s ease;
        }

        .credit-card:hover .credit-image {
            transform: scale(1.03);
            filter: brightness(1.05);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen selection:bg-pink-500 selection:text-black">

    <header class="py-8 border-b border-zinc-900 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-5">
            <div class="flex flex-col sm:flex-row items-center gap-5">
                <div class="relative w-16 h-16 rounded-full p-[2px] profile-glow overflow-hidden shrink-0">
                    <img src="https://img2.pic.in.th/1eb70379-638a-4694-90eb-693ed5f2892f0887f90e415c8ae2.png" 
                         alt="SEALION Profile" 
                         class="w-full h-full object-cover rounded-full bg-zinc-900">
                </div>
                <div class="text-center sm:text-left">
                    <h1 class="text-2xl md:text-4xl font-neon font-black tracking-wider text-pink-500 neon-glow uppercase">
                        imsealionnn
                    </h1>
                    <div class="flex items-center justify-center sm:justify-start gap-2 mt-1">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        <p class="text-zinc-400 text-xs font-light tracking-wide">BY Blonderax Shop • <span class="font-semibold text-white">ปลอดภัย 100%</span>
                        </p>
                    </div>
                </div>
            </div>
            
            <div>
                <a href="https://discord.gg/vg9sQvgx9c" target="_blank" class="px-6 py-3 rounded-lg bg-pink-500 hover:bg-pink-600 text-black font-bold text-xs tracking-widest flex items-center gap-2 transition-all transform hover:-translate-y-0.5 shadow-md shadow-pink-500/10 uppercase">
                    📩 open ticket (สั่งซื้อสินค้า)
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        
        <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-12 pb-8 border-b border-zinc-900">
            <div>
                <h2 class="text-xl md:text-2xl font-black text-white tracking-wider uppercase flex items-center gap-2.5">
                    <span class="text-pink-500">🗂️</span> ประวัติการซื้อ-ขายเงินเขียว FiveM
                </h2>
                <p class="text-zinc-500 text-xs md:text-sm mt-1"></p>
            </div>
            
            <div class="bg-zinc-950 border border-zinc-850 rounded-xl px-6 py-2.5 text-center min-w-[180px] shadow-lg relative overflow-hidden before:absolute before:top-0 before:left-0 before:w-1 before:h-full before:bg-pink-500">
                <p class="text-zinc-500 text-[10px] uppercase tracking-widest font-neon font-medium">ขายไปแล้วทั้งหมด</p>
                <h3 id="total-m-display" class="text-2xl md:text-3xl font-neon font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400">
                    7M
                </h3>
            </div>
        </div>

        <div class="flex flex-wrap justify-center sm:justify-start gap-2 mb-10" id="filter-container">
            <button onclick="filterCountry('all')" id="btn-all" class="px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-300 bg-pink-500 border border-pink-500 text-black shadow-md flex items-center gap-1.5">
                [ ALL ]
            </button>
        </div>

        <div id="dynamic-content" class="space-y-14"></div>

    </main>

    <footer class="border-t border-zinc-900/30 bg-zinc-950 py-8 mt-24">
        <div class="max-w-5xl mx-auto px-4 text-center">
            <p class="font-neon text-xs text-zinc-600 tracking-widest">IMSEALIONNN LOGISTICS</p>
            <p class="text-[10px] text-zinc-800 tracking-wider mt-1.5">&copy; 2026. Secured Gateway.</p>
        </div>
    </footer>

    <div id="imageModal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300" onclick="closeModal()">
        <button class="absolute top-6 right-6 text-zinc-500 hover:text-white text-4xl font-light transition-colors" onclick="closeModal()">&times;</button>
        <div class="max-w-4xl max-h-[90vh] overflow-hidden rounded-xl border border-zinc-800 bg-zinc-950 shadow-2xl p-1" onclick="event.stopPropagation()">
            <img id="modalImage" src="" alt="Enlarged Credit" class="max-w-full max-h-[85vh] object-contain rounded-lg">
        </div>
    </div>

    <script>
        let allData = [];

        async function loadCredits() {
            const dynamicContent = document.getElementById('dynamic-content');
            const totalDisplay = document.getElementById('total-m-display');
            const filterContainer = document.getElementById('filter-container');
            
            // ตั้งค่าเริ่มต้นไว้ที่ 7 ตามที่คุณกำหนด
            let totalM = 0; 

            try {
                const response = await fetch('credits.txt');
                if (!response.ok) throw new Error('Load failed');
                
                const text = await response.text();
                const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
                
                const groupedCountries = {};

                lines.forEach(line => {
                    const parts = line.split(',');
                    const url = parts[0] ? parts[0].trim() : '';
                    const country = parts[1] ? parts[1].trim() : 'ทั่วไป';
                    const mAmount = parts[2] ? parts[2].trim() : '0';

                    const mValue = parseFloat(mAmount);
                    if (!isNaN(mValue)) { totalM += mValue; }

                    const creditItem = { url, country, mAmount };
                    allData.push(creditItem);

                    if (!groupedCountries[country]) {
                        groupedCountries[country] = [];
                    }
                    groupedCountries[country].push(creditItem);
                });

                // แสดงผลยอดรวมสะสม (7M + ยอดจากไฟล์ text)
                totalDisplay.innerText = totalM.toLocaleString() + 'M';

                Object.keys(groupedCountries).forEach(countryName => {
                    const btn = document.createElement('button');
                    btn.id = `btn-${countryName}`;
                    btn.className = "px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-300 bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white hover:border-zinc-700 flex items-center gap-1.5";
                    btn.innerHTML = `<span class="text-pink-500 font-mono">⌖</span> ${countryName}`;
                    btn.onclick = () => filterCountry(countryName);
                    filterContainer.appendChild(btn);
                });

                renderGroups(groupedCountries);

            } catch (error) {
                console.error(error);
                // หากโหลดไฟล์ไม่เข้า จะยังคงแสดงตัวเลขเริ่มต้น 7M เอาไว้ให้
                totalDisplay.innerText = '7M';
                dynamicContent.innerHTML = `<p class="text-pink-500 text-center py-10 bg-zinc-950 rounded-xl border border-dashed border-zinc-900 text-sm">คลังรีวิวกำลังอัปเดตข้อมูลระบบ...</p>`;
            }
        }

        function renderGroups(groups) {
            const dynamicContent = document.getElementById('dynamic-content');
            dynamicContent.innerHTML = '';

            Object.keys(groups).forEach(countryName => {
                const items = groups[countryName];
                const section = document.createElement('section');
                section.className = "country-section";
                section.setAttribute('data-country', countryName);

                section.innerHTML = `
                    <div class="flex items-center gap-2.5 mb-5 border-b border-zinc-900 pb-2.5">
                        <span class="text-base text-pink-500">◈</span>
                        <h3 class="text-lg font-bold text-white tracking-wider uppercase">${countryName}</h3>
                        <span class="bg-zinc-900 border border-zinc-800 text-zinc-500 text-[10px] px-2 py-0.5 rounded font-neon">
                            SEC: ${items.length}
                        </span>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                        ${items.map(item => `
                            <div class="credit-card group cursor-pointer aspect-[3/4] flex flex-col justify-between p-2 shadow-md" onclick="openModal(this)">
                                <div class="w-full h-[84%] rounded-lg overflow-hidden bg-zinc-950 flex items-center justify-center relative border border-zinc-900">
                                    
                                    <span class="absolute top-2 left-2 z-10 text-[8px] font-neon tracking-widest font-bold bg-black/90 text-green-400 px-1.5 py-0.5 rounded border border-green-500/20">
                                        SECURED
                                    </span>
                                    
                                    <img src="${item.url}" 
                                         alt="Credit Image" 
                                         class="credit-image w-full h-full object-cover"
                                         onerror="this.src='https://placehold.co/400x533/18181b/ec4899?text=Image+Not+Found'">
                                </div>
                                <div class="h-[13%] w-full px-0.5 flex items-center justify-between">
                                    <span class="text-[9px] font-neon tracking-wider text-zinc-600 group-hover:text-zinc-400 transition-colors">COMPLETED</span>
                                    <span class="text-pink-500 font-neon font-black text-xs">
                                        +${item.mAmount}M
                                    </span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                dynamicContent.appendChild(section);
            });
        }

        function filterCountry(targetCountry) {
            const buttons = document.querySelectorAll('#filter-container button');
            buttons.forEach(btn => {
                if(btn.id === 'btn-all') {
                    btn.className = "px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-300 bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white hover:border-zinc-700 flex items-center gap-1.5";
                } else {
                    btn.className = "px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-300 bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-white hover:border-zinc-700 flex items-center gap-1.5";
                    btn.innerHTML = `<span class="text-pink-500 font-mono">⌖</span> ${btn.innerText.replace('⌖ ', '')}`;
                }
            });
            
            const activeBtn = document.getElementById(targetCountry === 'all' ? 'btn-all' : `btn-${targetCountry}`);
            if(activeBtn) {
                if(targetCountry === 'all') {
                    activeBtn.className = "px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-300 bg-pink-500 border border-pink-500 text-black shadow-md flex items-center gap-1.5";
                } else {
                    activeBtn.className = "px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-300 bg-pink-500 border border-pink-500 text-black shadow-md flex items-center gap-1.5";
                    activeBtn.innerHTML = `<span class="text-black font-mono">⌖</span> ${targetCountry}`;
                }
            }

            if (targetCountry === 'all') {
                const reGrouped = {};
                allData.forEach(item => {
                    if (!reGrouped[item.country]) reGrouped[item.country] = [];
                    reGrouped[item.country].push(item);
                });
                renderGroups(reGrouped);
            } else {
                const filteredGroup = {};
                filteredGroup[targetCountry] = allData.filter(item => item.country === targetCountry);
                renderGroups(filteredGroup);
            }
        }

        function openModal(element) {
            const imgSrc = element.querySelector('.credit-image').src;
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = imgSrc;
            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => { modalImg.src = ''; }, 300);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        window.onload = loadCredits;
    </script>

</body>
</html>
